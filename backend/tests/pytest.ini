[pytest]
# Note: async test markers use AnyIO/pytest-anyio; avoid pytest option warnings

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    grpc: marks tests that use gRPC
    http: marks tests that use HTTP REST
    slow: marks tests as slow (deselect with '-m "not slow"')

# Test output options
addopts = 
    --tb=short
    --strict-markers
    -v
    --color=yes

# AnyIO backend can be selected via command-line (`-o anyio_backend=asyncio`) or environment.

# Ignore files and directories
testpaths = .
