name: CI / CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@10.28.1

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: ./frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: ./frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-next
          path: |
            frontend/.next
            frontend/public
            frontend/package.json

  build-and-push:
    name: Build & Push Docker images (GHCR)
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build & push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/medtrack-backend:${{ github.sha }}

      - name: Build & push rust image
        uses: docker/build-push-action@v4
        with:
          context: ./rust_analytics
          file: ./rust_analytics/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/medtrack-rust-analytics:${{ github.sha }}

  deploy-to-koyeb:
    name: Deploy to Koyeb (optional)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: ${{ secrets.KOYEB_API_TOKEN }}
    steps:
      - name: Echo images
        run: |
          echo "Backend image: ghcr.io/${{ github.repository_owner }}/medtrack-backend:${{ github.sha }}"
          echo "Rust image: ghcr.io/${{ github.repository_owner }}/medtrack-rust-analytics:${{ github.sha }}"

      - name: Deploy backend to Koyeb via API
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/medtrack-backend:${{ github.sha }}
          APP_ID: ${{ secrets.KOYEB_APP_BACKEND }}
        run: |
          if [ -z "$APP_ID" ]; then
            echo "No backend app id available; skipping backend deployment"
            exit 0
          fi
          read -r -d '' PAYLOAD <<EOF || true
{"services":[{"image":"${IMAGE}"}]}
EOF
          echo "$PAYLOAD" | jq .
          curl -s -X POST "https://api.koyeb.com/v1/apps/${APP_ID}/deployments" \
            -H "Authorization: Bearer ${KOYEB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" | jq .
