name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.32.1"

jobs:
  test-backend:
    name: Backend — lint, type-check, test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/medtrack_test
      JWT_SECRET: ci-jwt-secret-not-used-in-prod
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-not-used-in-prod
      REDIS_URL: redis://localhost:6379

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medtrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: pnpm prisma generate

      - name: Lint
        working-directory: backend
        run: pnpm run lint

      - name: Type check
        working-directory: backend
        run: pnpm tsc --noEmit

      - name: Unit tests
        working-directory: backend
        run: pnpm run test --passWithNoTests

      - name: E2E tests
        working-directory: backend
        run: pnpm run test:e2e --passWithNoTests

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage/lcov.info
          flags: backend

  test-frontend:
    name: Frontend — lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm run lint

      - name: Type check
        working-directory: frontend
        run: pnpm run type-check 

      - name: Tests
        working-directory: frontend
        run: pnpm run test:ci --passWithNoTests

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: frontend/coverage/lcov.info
          flags: frontend

  test-rust:
    name: Rust analytics — fmt, clippy, test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/medtrack_test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medtrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust_analytics/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust_analytics/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        working-directory: rust_analytics
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: rust_analytics
        run: cargo clippy -- -D warnings

      - name: Tests
        working-directory: rust_analytics
        run: cargo test

  docker-build-check:
    name: Docker build smoke check (no push)
    runs-on: ubuntu-latest
    # Only run on PRs targeting main — saves minutes on every branch push
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            target: production
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            target: final
          - service: rust-analytics
            context: ./rust_analytics
            dockerfile: ./rust_analytics/Dockerfile
            target: ""

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-contexts: |
            protos=./protos
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
