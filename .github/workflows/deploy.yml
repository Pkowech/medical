name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.32.1"
  REGISTRY: ghcr.io
  OWNER: ${{ toLower(github.repository_owner) }}

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & push backend image → GHCR
  # ──────────────────────────────────────────────
  build-backend:
    name: Build & push backend image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ env.REGISTRY }}/${{ env.OWNER }}/medtrack-backend:sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/medtrack-backend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/medtrack-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ──────────────────────────────────────────────
  # 2. Build & push rust-analytics image → GHCR
  # ──────────────────────────────────────────────
  build-rust:
    name: Build & push rust-analytics image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ env.REGISTRY }}/${{ env.OWNER }}/medtrack-rust-analytics:sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./rust_analytics
          file: ./rust_analytics/Dockerfile
          build-contexts: |
            protos=./protos
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/medtrack-rust-analytics:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/medtrack-rust-analytics:latest
          cache-from: type=gha,scope=rust-analytics
          cache-to: type=gha,mode=max,scope=rust-analytics

  # ──────────────────────────────────────────────
  # 3. Deploy frontend → Vercel
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Validate Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "Vercel token is not set. Please add secrets.VERCEL_TOKEN to the repository."
            exit 1
          fi

      - name: Pull Vercel environment
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ──────────────────────────────────────────────
  # 4. Prisma migrations (before backend goes live)
  # ──────────────────────────────────────────────
  migrate:
    name: Prisma migrate deploy
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: pnpm prisma generate

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL || secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.NEON_DIRECT_URL || secrets.DIRECT_URL || secrets.NEON_DATABASE_URL || secrets.DATABASE_URL }}
        run: pnpm prisma migrate deploy

  # ──────────────────────────────────────────────
  # 5. Deploy backend container → Render
  #    Uses Render's PATCH /services/:id endpoint to
  #    update the image, then POSTs a deploy trigger.
  # ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend → Render
    runs-on: ubuntu-latest
    needs: [build-backend, migrate]

    steps:
      - name: Update image & trigger deploy
        env:
          IMAGE: ${{ needs.build-backend.outputs.image }}
        run: |
          # Update the image on the Render service
          curl -fsS -X PATCH "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_BACKEND }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"image\":{\"url\":\"${IMAGE}\",\"credentials\":{\"registryCredentialId\":\"${{ secrets.RENDER_GHCR_CRED_ID }}\"}}}"

          # Trigger the deploy
          curl -fsS -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_BACKEND }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{}"

  # ──────────────────────────────────────────────
  # 6. Deploy rust-analytics container → Render
  # ──────────────────────────────────────────────
  deploy-rust:
    name: Deploy rust-analytics → Render
    runs-on: ubuntu-latest
    needs: build-rust

    steps:
      - name: Update image & trigger deploy
        env:
          IMAGE: ${{ needs.build-rust.outputs.image }}
        run: |
          curl -fsS -X PATCH "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_RUST }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"image\":{\"url\":\"${IMAGE}\",\"credentials\":{\"registryCredentialId\":\"${{ secrets.RENDER_GHCR_CRED_ID }}\"}}}"

          curl -fsS -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_RUST }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{}"

  # ──────────────────────────────────────────────
  # 7. Smoke tests
  # ──────────────────────────────────────────────
  smoke-tests:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, deploy-rust]
    if: |
      always() &&
      needs.deploy-frontend.result == 'success' &&
      needs.deploy-backend.result == 'success' &&
      needs.deploy-rust.result == 'success'

    steps:
      - name: Wait for services to start
        run: sleep 40

      - name: Backend health check
        if: env.BACKEND_HEALTH_URL != ''
        env:
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_HEALTH_URL")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Backend healthy"; exit 0
            fi
            sleep 20
          done
          echo "Backend health check failed" >&2; exit 1

      - name: Frontend health check
        if: env.FRONTEND_HEALTH_URL != ''
        env:
          FRONTEND_HEALTH_URL: ${{ secrets.FRONTEND_HEALTH_URL }}
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_HEALTH_URL")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Frontend healthy"; exit 0
            fi
            sleep 20
          done
          echo "Frontend health check failed" >&2; exit 1

      - name: Rust analytics health check
        if: env.RUST_HEALTH_URL != ''
        env:
          RUST_HEALTH_URL: ${{ secrets.RUST_HEALTH_URL }}
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RUST_HEALTH_URL")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Rust analytics healthy"; exit 0
            fi
            sleep 20
          done
          echo "Rust analytics health check failed" >&2; exit 1
