name: Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.12.2"

jobs:
  # ──────────────────────────────────────────────
  # 1. Deploy frontend to Vercel
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ──────────────────────────────────────────────
  # 2. Run Prisma migrations before backend goes live
  # ──────────────────────────────────────────────
  migrate:
    name: Prisma migrate deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: pnpm prisma generate

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm prisma migrate deploy

  # ──────────────────────────────────────────────
  # 3. Trigger Render deploys (backend + rust)
  #    Render deploy hooks are plain HTTPS POSTs —
  #    no token auth needed beyond the secret URL.
  # ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend → Render
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Trigger Render deploy
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
          echo "Backend deploy triggered"

  deploy-rust:
    name: Deploy rust-analytics → Render
    runs-on: ubuntu-latest
    # rust deploy is independent of migrations
    needs: migrate

    steps:
      - name: Trigger Render deploy
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_RUST }}"
          echo "Rust analytics deploy triggered"

  # ──────────────────────────────────────────────
  # 4. Smoke tests — run after all deploys settle
  # ──────────────────────────────────────────────
  smoke-tests:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, deploy-rust]
    if: always() &&
      needs.deploy-frontend.result == 'success' &&
      needs.deploy-backend.result == 'success' &&
      needs.deploy-rust.result == 'success'

    steps:
      - name: Wait for services to start
        run: sleep 30

      - name: Backend health check
        if: ${{ secrets.BACKEND_HEALTH_URL != '' }}
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_HEALTH_URL }}")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Backend healthy"; exit 0
            fi
            sleep 20
          done
          echo "Backend health check failed" >&2; exit 1

      - name: Frontend health check
        if: ${{ secrets.FRONTEND_HEALTH_URL != '' }}
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.FRONTEND_HEALTH_URL }}")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Frontend healthy"; exit 0
            fi
            sleep 20
          done
          echo "Frontend health check failed" >&2; exit 1

      - name: Rust analytics health check
        if: ${{ secrets.RUST_HEALTH_URL != '' }}
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RUST_HEALTH_URL }}")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Rust analytics healthy"; exit 0
            fi
            sleep 20
          done
          echo "Rust analytics health check failed" >&2; exit 1
